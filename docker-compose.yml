services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: taskflow_app
    ports:
      - "3000:3000"
    volumes:
      - ./src:/usr/share/nginx/html
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
