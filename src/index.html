<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app" role="main" aria-label="TaskFlow application">
    <h1>TaskFlow</h1>
    <form class="add-task" role="search" aria-label="Add task" onsubmit="return false;">
      <label for="task-input" class="sr-only">Task title</label>
      <input type="text" id="task-input" class="task-input" placeholder="Add a task..." aria-label="Task title" autofocus>
      <button class="add-btn" type="button" aria-label="Add task">Add</button>
    </form>
    <section class="task-container" aria-live="polite" aria-label="Task list"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
