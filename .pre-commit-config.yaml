fail_fast: true

repos:
  # Layer 1: File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key

  # Layer 2: JS syntax validation
  - repo: local
    hooks:
      - id: js-syntax-check
        name: JavaScript Syntax Check
        entry: bash -c 'for f in "$@"; do node --check "$f" || exit 1; done'
        language: system
        files: \.js$
        exclude: node_modules/

  # Layer 3: Dependency Health (UC16)
  - repo: local
    hooks:
      - id: dependency-health
        name: Dependency Health (UC16)
        entry: bash -c 'npm audit --audit-level=high 2>/dev/null || echo "Audit check complete"'
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 4: Focused test detection (UC18 / TEST-001)
  - repo: local
    hooks:
      - id: no-focused-tests
        name: No Focused Tests (UC18)
        entry: bash -c 'if grep -rn ".only(" tests/ --include="*.js" 2>/dev/null; then echo "BLOCKED - Remove .only() from tests" && exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 5: Iron Dome — Silent Catch Ratchet
  - repo: local
    hooks:
      - id: silent-catch-ratchet
        name: Iron Dome - Silent Catches
        entry: node scripts/governance/check-silent-catches.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 6: Rising Tide — Mock Tax (2x Rule)
  - repo: local
    hooks:
      - id: mock-tax
        name: Rising Tide - Mock Tax (2x Rule)
        entry: node scripts/governance/check-mock-tax.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 7: Escape Hatch Gate
  - repo: local
    hooks:
      - id: eslint-disable-ratchet
        name: Escape Hatch - No New Lint Suppressions
        entry: node scripts/governance/check-eslint-disable.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 8: SRP Guardrails
  - repo: local
    hooks:
      - id: srp-guardrails
        name: SRP Guardrails (file size limits)
        entry: node scripts/governance/guardrails-check.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 9: Test Discipline
  - repo: local
    hooks:
      - id: skipped-tests
        name: Test Discipline - Max 5% Skipped
        entry: node scripts/governance/check-skipped-tests.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Layer 10: Unit tests (TIA)
  - repo: local
    hooks:
      - id: jest-tia
        name: Jest TIA (affected tests only)
        entry: bash -c 'npx jest --forceExit --passWithNoTests'
        language: system
        files: \.(js|json)$
        exclude: node_modules/
        pass_filenames: false
        stages: [pre-commit]
